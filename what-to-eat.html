        const detailType = document.getElementById('detailType');
        const detailPhoto = document.getElementById('detailPhoto');
        const detailNavBtn = document.getElementById('detailNavBtn');

        let allRestaurants = [];
        let currentTab = 'restaurant';
        let selectedLocation = null;
        let detailMapInstance = null;
        
        const categories = {
            restaurant: { name: '餐厅', data: [] },
            milkTea: { name: '奶茶店', data: [] },
            dessert: { name: '甜品下午茶', data: [] },
        };
        
        const milkTeaKeywords = ['奶茶', '茶饮', '果茶', '茶颜', '喜茶', '奈雪', '蜜雪', '一点点', '益禾堂', '古茗', 'CoCo', '都可', '茶百道', '沪上阿姨', '瑞幸', '星巴克', '咖啡', '咖啡厅', '冷饮', '茶艺', '茶座'];
        const dessertKeywords = ['甜品', '蛋糕', '烘焙', '面包', '点心', '下午茶', '冰淇淋', '雪糕', '酸奶', '布丁', '糕饼', '甜品店', '西点', '糖果'];
        
        const milkTeaTypecodes = ['050600'];
        const dessertTypecodes = ['050700', '050800'];

        let geocoder, placeSearch, autoComplete;

        function initAMap() {
            if (typeof AMap !== 'undefined') {
                geocoder = new AMap.Geocoder({
                    city: '全国',
                });
                placeSearch = new AMap.PlaceSearch({
                    pageSize: 25,
                    pageIndex: 1,
                    type: '050000',
                    extensions: 'all',
                });
                autoComplete = new AMap.AutoComplete({
                    city: '全国',
                    input: 'addressInput',
                });
            }
        }

        if (typeof AMap !== 'undefined') {
            initAMap();
        } else {
            window.addEventListener('load', initAMap);
        }

        function showAutoCompleteResults(results) {
            if (!results || results.length === 0) {
                autocompleteList.classList.add('hidden');
                return;
            }

            autocompleteList.innerHTML = results.map(item => `
                <div class="px-4 py-3 hover:bg-[#dbeafe] cursor-pointer transition-colors border-b-2 border-black last:border-b-0" onclick="selectAddress('${item.name}', '${item.district || ''}', ${item.location.lng}, ${item.location.lat})">
                    <div class="font-bold text-black">${item.name}</div>
                    <div class="text-sm text-gray-600">${item.district || ''}${item.name}</div>
                </div>
            `).join('');
            autocompleteList.classList.remove('hidden');
        }

        window.selectAddress = function(name, district, lng, lat) {
            addressInput.value = district ? district + name : name;
            selectedLocation = { lng, lat };
            autocompleteList.classList.add('hidden');
            searchRestaurants();
        };

        addressInput.addEventListener('input', function() {
            const keyword = this.value.trim();
            if (!keyword) {
                autocompleteList.classList.add('hidden');
                return;
            }

            if (!autoComplete) {
                initAMap();
            }

            autoComplete.search(keyword, function(status, result) {
                if (status === 'complete' && result.tips) {
                    showAutoCompleteResults(result.tips);
                }
            });
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#addressInput') && !e.target.closest('#autocompleteList')) {
                autocompleteList.classList.add('hidden');
            }
        });

        function classifyRestaurants(pois) {
            categories.restaurant.data = [];
            categories.milkTea.data = [];
            categories.dessert.data = [];
            
            pois.forEach(poi => {
                const photoUrl = poi.photos && poi.photos.length > 0 ? poi.photos[0].url : null;
                const location = poi.location || {};
                const typeParts = (poi.type || '').split(';');
                const cuisine = typeParts.length > 1 ? typeParts[1] : (typeParts[0] || '餐饮');
                
                const restaurant = {
                    name: poi.name,
                    address: poi.address || poi.adname + poi.name,
                    distance: poi.distance ? poi.distance + '米' : '未知距离',
                    rating: poi.score || '暂无评分',
                    type: poi.type || '餐饮',
                    cuisine: cuisine,
                    photoUrl: photoUrl,
                    typecode: poi.typecode || '',
                    lng: location.lng || 0,
                    lat: location.lat || 0,
                    tel: poi.tel || '',
                    openingTime: poi.opening_time || '',
                };
                
                const nameLower = poi.name.toLowerCase();
                const typeLower = (poi.type || '').toLowerCase();
                
                let matched = false;
                
                if (dessertTypecodes.includes(poi.typecode)) {
                    categories.dessert.data.push(restaurant);
                    matched = true;
                } else {
                    for (const keyword of dessertKeywords) {
                        if (nameLower.includes(keyword.toLowerCase()) || typeLower.includes(keyword.toLowerCase())) {
                            categories.dessert.data.push(restaurant);
                            matched = true;
                            break;
                        }
                    }
                }
                
                if (!matched) {
                    if (milkTeaTypecodes.includes(poi.typecode)) {
                        categories.milkTea.data.push(restaurant);
                        matched = true;
                    } else {
                        for (const keyword of milkTeaKeywords) {
                            if (nameLower.includes(keyword.toLowerCase()) || typeLower.includes(keyword.toLowerCase())) {
                                categories.milkTea.data.push(restaurant);
                                matched = true;
                                break;
                            }
                        }
                    }
                }
                
                if (!matched) {
                    categories.restaurant.data.push(restaurant);
                }
            });
        }

        function switchTab(tabName) {
            currentTab = tabName;
            
            tabBtns.forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-red-500', 'to-orange-500', 'from-purple-500', 'to-pink-500', 'from-yellow-500', 'to-orange-400', 'text-white', 'font-bold');
                btn.classList.add('bg-gray-200', 'text-gray-600', 'hover:bg-gray-300');
                
                if (btn.dataset.tab === tabName) {
                    btn.classList.remove('bg-gray-200', 'text-gray-600', 'hover:bg-gray-300');
                    if (btn.dataset.tab === 'restaurant') {
                        btn.classList.add('bg-gradient-to-r', 'from-red-500', 'to-orange-500', 'text-white', 'font-bold');
                    } else if (btn.dataset.tab === 'milkTea') {
                        btn.classList.add('bg-gradient-to-r', 'from-purple-500', 'to-pink-500', 'text-white', 'font-bold');
                    } else if (btn.dataset.tab === 'dessert') {
                        btn.classList.add('bg-gradient-to-r', 'from-yellow-500', 'to-orange-400', 'text-white', 'font-bold');
                    }
                }
            });
            
            renderCurrentTab();
        }

        function renderCurrentTab() {
            const data = categories[currentTab].data;
            
            restaurantCount.textContent = `共 ${data.length} 家${categories[currentTab].name}`;
            
            if (data.length > 0) {
                cardsContainer.innerHTML = data.map((r, index) => {
                    const card = createRestaurantCard(r);
                    return card.replace('class="detail-btn', `data-index="${index}" class="detail-btn`);
                }).join('');
                cardsContainer.classList.remove('hidden');
                emptyTabState.classList.add('hidden');
                
                document.querySelectorAll('.detail-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        const restaurant = categories[currentTab].data[index];
                        showDetail(restaurant);
                    });
                });
            } else {
                cardsContainer.classList.add('hidden');
                emptyTabState.classList.remove('hidden');
            }
        }

        function renderRestaurants() {
            restaurantList.classList.remove('hidden');
            randomSelector.classList.remove('hidden');
            selectedResult.classList.add('hidden');
            switchTab('restaurant');
        }

        function searchNearbyByLocation(lng, lat) {
            loadingState.classList.remove('hidden');
            noResultState.classList.add('hidden');
            restaurantList.classList.add('hidden');
            randomSelector.classList.add('hidden');
            selectedResult.classList.add('hidden');

            const allPois = [];
            const maxPages = 4;
            let completedPages = 0;

            for (let pageIndex = 1; pageIndex <= maxPages; pageIndex++) {
                placeSearch.setPageIndex(pageIndex);
                placeSearch.searchNearBy('餐饮', [lng, lat], 500, function(status, result) {
                    completedPages++;
                    
                    if (status === 'complete' && result.poiList && result.poiList.pois.length > 0) {
                        allPois.push(...result.poiList.pois);
                    }

                    if (completedPages === maxPages) {
                        loadingState.classList.add('hidden');
                        
                        if (allPois.length > 0) {
                            allRestaurants = allPois.map(poi => {
                                const location = poi.location || {};
                                return {
                                    name: poi.name,
                                    address: poi.address || poi.adname + poi.name,
                                    distance: poi.distance ? poi.distance + '米' : '未知距离',
                                    rating: poi.score || '暂无评分',
                                    type: poi.type || '餐饮',
                                    lng: location.lng || 0,
                                    lat: location.lat || 0,
                                };
                            });
                            classifyRestaurants(allPois);
                            renderRestaurants();
                        } else {
                            noResultState.classList.remove('hidden');
                        }
                    }
                });
            }
        }

        function getCurrentLocation() {
            if (typeof AMap === 'undefined' || !placeSearch) {
                alert('地图服务加载中，请稍后重试');
                return;
            }

            if (!navigator.geolocation) {
                alert('您的浏览器不支持定位功能');
                return;
            }

            loadingState.classList.remove('hidden');
            noResultState.classList.add('hidden');
            restaurantList.classList.add('hidden');
            randomSelector.classList.add('hidden');
            selectedResult.classList.add('hidden');

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lng = position.coords.longitude;
                    const lat = position.coords.latitude;
                    searchNearbyByLocation(lng, lat);
                },
                function(error) {
                    loadingState.classList.add('hidden');
                    let errorMsg = '获取位置失败';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = '请允许定位权限';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = '位置信息不可用';
                            break;
                        case error.TIMEOUT:
                            errorMsg = '定位超时';
                            break;
                    }
                    alert(errorMsg);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        function createRestaurantCard(restaurant, isSelected = false) {
            const imageHtml = restaurant.photoUrl ? `
                <img src="${restaurant.photoUrl}" alt="${restaurant.name}" class="w-16 h-16 object-cover bg-gray-200 border-2 border-black" />
            ` : `
                <div class="w-16 h-16 bg-[#fdf6e3] flex items-center justify-center border-2 border-black">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-[#eab308]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
            `;
            
            const navUrl = restaurant.lng && restaurant.lat ? `https://uri.amap.com/navigation?to=${restaurant.lng},${restaurant.lat},${encodeURIComponent(restaurant.name)}&mode=car` : '';
            
            return `
                <div class="restaurant-card ${isSelected ? 'selected' : ''} bg-white p-4 border-3 border-black">
                    <div class="flex items-start gap-4 mb-4">
                        ${imageHtml}
                        <div class="flex-1">
                            <h3 class="text-xl font-bold text-black mb-1">${restaurant.name}</h3>
                            <span class="px-3 py-1 bg-[#ec4899] text-white text-xs font-bold">${restaurant.cuisine}</span>
                        </div>
                        <div class="flex items-center gap-1 bg-[#22c55e] text-white px-2 py-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                            <span class="font-bold text-sm">${restaurant.rating}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 text-gray-700 text-sm mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span>${restaurant.address}</span>
                    </div>
                    <div class="flex items-center gap-2 text-[#ef4444] font-bold text-sm mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        <span>${restaurant.distance}</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="detail-btn flex-1 py-2 bg-[#eab308] text-black font-bold border-2 border-black hover:bg-[#ca8a04] transition-colors flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"></path>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            查看详情
                        </button>
                        ${navUrl ? `
                            <button onclick="window.open('${navUrl}', '_blank')" class="flex-1 py-2 bg-[#3b82f6] text-white font-bold border-2 border-black hover:bg-[#2563eb] transition-colors flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                                </svg>
                                导航
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function searchRestaurants() {
            const address = addressInput.value.trim();
            if (!address) {
                alert('请输入搜索地址');
                return;
            }

            if (typeof AMap === 'undefined' || !geocoder || !placeSearch) {
                alert('地图服务加载中，请稍后重试');
                return;
            }

            loadingState.classList.remove('hidden');
            noResultState.classList.add('hidden');
            restaurantList.classList.add('hidden');
            randomSelector.classList.add('hidden');
            selectedResult.classList.add('hidden');

            if (selectedLocation) {
                searchNearbyByLocation(selectedLocation.lng, selectedLocation.lat);
                selectedLocation = null;
                return;
            }

            geocoder.getLocation(address, function(status, result) {
                if (status === 'complete' && result.geocodes.length > 0) {
                    const location = result.geocodes[0].location;
                    searchNearbyByLocation(location.lng, location.lat);
                } else {
                    loadingState.classList.add('hidden');
                    noResultState.classList.remove('hidden');
                }
            });
        }

        function selectRandomRestaurant() {
            const data = categories[currentTab].data;
            if (data.length === 0) {
                alert('当前分类没有餐厅');
                return;
            }

            const randomIndex = Math.floor(Math.random() * data.length);
            const selected = data[randomIndex];

            document.querySelectorAll('.restaurant-card').forEach((card, index) => {
                card.classList.remove('selected');
                if (index === randomIndex) {
                    card.classList.add('selected');
                }
            });

            selectedCard.innerHTML = createRestaurantCard(selected, true);
            selectedResult.classList.remove('hidden');

            selectedResult.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showDetail(restaurant) {
            detailModal.classList.remove('hidden');
            
            detailPhoto.innerHTML = restaurant.photoUrl ? `
                <img src="${restaurant.photoUrl}" alt="${restaurant.name}" class="w-full h-full object-cover" />
            ` : `
                <div class="w-full h-full bg-[#fdf6e3] flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-[#eab308]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
            `;
            
            detailName.textContent = restaurant.name;
            
            const cuisineParts = restaurant.type.split(';').filter(p => p);
            detailCuisine.innerHTML = cuisineParts.map(c => `
                <span class="px-3 py-1 bg-[#ec4899] text-white text-xs font-bold border-2 border-black">${c}</span>
            `).join('');
            
            detailRating.textContent = restaurant.rating;
            detailDistance.textContent = restaurant.distance;
            detailAddress.textContent = restaurant.address;
            
            if (restaurant.tel) {
                detailPhone.href = `tel:${restaurant.tel}`;
                detailPhone.textContent = restaurant.tel;
            } else {
                detailPhone.href = '#';
                detailPhone.textContent = '暂无电话';
            }
            
            detailHours.textContent = restaurant.openingTime || '暂无营业时间';
            detailType.textContent = restaurant.cuisine;
            
            const navUrl = restaurant.lng && restaurant.lat ? `https://uri.amap.com/navigation?to=${restaurant.lng},${restaurant.lat},${encodeURIComponent(restaurant.name)}&mode=car` : '';
            detailNavBtn.onclick = navUrl ? () => window.open(navUrl, '_blank') : () => alert('无法导航');
            
            setTimeout(() => {
                initDetailMap(restaurant.lng, restaurant.lat, restaurant.name);
            }, 100);
        }

        function closeDetail() {
            detailModal.classList.add('hidden');
            if (detailMapInstance) {
                detailMapInstance.destroy();
                detailMapInstance = null;
            }
        }

        function initDetailMap(lng, lat, name) {
            if (!lng || !lat) return;
            
            detailMapInstance = new AMap.Map('detailMap', {
                zoom: 16,
                center: [lng, lat],
                mapStyle: 'amap://styles/light',
            });
            
            new AMap.Marker({
                position: [lng, lat],
                map: detailMapInstance,
                title: name,
                icon: new AMap.Icon({
                    size: new AMap.Size(40, 40),
                    image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                    imageSize: new AMap.Size(40, 40),
                }),
            });
        }

        searchBtn.addEventListener('click', searchRestaurants);
        addressInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchRestaurants();
        });
        randomBtn.addEventListener('click', selectRandomRestaurant);
        locateBtn.addEventListener('click', getCurrentLocation);
        
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });
    </script>
</body>
</html>
